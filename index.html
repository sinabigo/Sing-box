<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل کانال تلگرامی SiNAVM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        body {
            text-align: center;
            font-family: 'Vazirmatn', Arial, sans-serif;
            margin: 20px;
            direction: rtl;
            background-color: #ffffff;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo {
            max-width: 80px;
            margin-left: 5px;
            border-radius: 30%;
            border: 2px solid #ccc;
            padding: 1px;
            background-color: white;
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            color: #222;
        }
        .header a {
            text-decoration: none;
            color: blue;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .subtext {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 20px;
        }
        .visit-container {
            position: fixed;
            bottom: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .visit-box {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            width: 80px;
        }
        .telegram-box {
            background: rgba(0, 136, 204, 0.9);
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            text-decoration: none;
            gap: 5px;
        }
        .telegram-box img {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <!-- بخش عنوان و لوگو -->
    <div class="header-container">
        <img class="logo" src="https://github.com/sinavm/sinavm/raw/refs/heads/main/IMG_7428.jpeg" alt="Logo">
        <div class="header">
            پنل اختصاصی  
            <a href="https://T.me/sinavm" target="_blank">SiNAVM</a>
        </div>
    </div>

    <!-- توضیح کوچک‌تر -->
    <div class="subtext">
        هر ساب لینکی رو انگشت کنید، اتوماتیک وارد میشه <br>  
        فقط قبلش برنامه اون ساب روی گوشیت نصب باشه
    </div>

    <!-- شمارنده بازدید -->
    <div class="visit-container">
        <a class="telegram-box" href="https://T.me/sinavm" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Telegram_2019_Logo.svg" alt="Telegram Logo">
            کانال تلگرام
        </a>
        <div class="visit-box">
            بازدید شما: <span id="user-visit-count">0</span>
        </div>
        <div class="visit-box">
            بازدید کل: <span id="total-visit-count">0</span>
        </div>
    </div>

    <script>
        // بررسی مقدار ذخیره‌شده در localStorage برای بازدید کاربر
        let visits = localStorage.getItem("visitCount") || 0;
        visits++; // افزایش تعداد بازدیدها
        localStorage.setItem("visitCount", visits); // ذخیره مقدار جدید
        document.getElementById("user-visit-count").innerText = visits; // نمایش تعداد بازدیدها

        // تابع دریافت تعداد بازدید کل از API
        document.addEventListener("DOMContentLoaded", function () {
            fetch('https://sinavm-visit-count.sinabb29.workers.dev')
                .then(response => response.json())
                .then(data => {
                    let countElement = document.getElementById("total-visit-count");
                    if (countElement) {
                        countElement.innerText = data.totalVisits; // نمایش تعداد بازدید کل
                    } else {
                        console.error("عنصر total-visit-count یافت نشد!");
                    }
                })
                .catch(error => console.error("Fetch error:", error));
        });
    </script>

</body>
</html>
